name: angular-blog-server
services:
  postgres:
    image: postgres:17-alpine
    container_name: angular_blog_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/enpeiii/angular-blog-server:latest
    container_name: angular_blog_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      GCS_PROJECT_ID: ${GCS_PROJECT_ID}
      GCS_CREDENTIALS_JSON: ${GCS_CREDENTIALS_JSON}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ALGOLIA_APP_ID: ${ALGOLIA_APP_ID}
      ALGOLIA_ADMIN_API_KEY: ${ALGOLIA_ADMIN_API_KEY}
      ALGOLIA_INDEX_NAME: ${ALGOLIA_INDEX_NAME:-blog-post}
      FRONTEND_URL: ${FRONTEND_URL:-https://enpei.com.tw}
    depends_on:
      postgres:
        condition: service_healthy

  dozzle:
    image: amir20/dozzle:latest
    container_name: angular_blog_dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      DOZZLE_BASE: /logs
      DOZZLE_NO_ANALYTICS: "1"

volumes:
  postgres_data:
