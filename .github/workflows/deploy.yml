name: Deploy Image to GCP

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed
    branches:
      - issue/CICD-test

jobs:
  deploy-to-gcp:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Check out the code
        uses: actions/checkout@v5

      - name: Copy docker-compose.prod.yml to GCP VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/"

      - name: Executing remote SSH commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            # 遠端叫 GCP 登入 ghcr.io
            echo "${{ secrets.GH_CR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 建立 .env 給 docker-compose 讀取
            printf '%s\n' \
              "POSTGRES_USER=${{ secrets.POSTGRES_USER }}" \
              "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" \
              "POSTGRES_DB=${{ secrets.POSTGRES_DB }}" \
              "DATABASE_URL=postgresql://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@postgres:5432/${{ secrets.POSTGRES_DB }}" \
              "NODE_ENV=production" \
              "PORT=3000" > ~/env.prod

            # 根據 docker-compose.prod.yml 抓取最新 Image
            docker compose -f ~/docker-compose.prod.yml --env-file ~/env.prod pull

            # 重新啟動容器
            docker compose -f ~/docker-compose.prod.yml --env-file ~/env.prod up -d

            # 清理舊 Image
            docker image prune -f
