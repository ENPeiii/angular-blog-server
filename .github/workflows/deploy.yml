name: Build and Deploy Blog to GCP

on:
  push:
    branches:
      - main # 只要你 push 到 main 分支，GitHub 就會自動發動！

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      # 1. 讓 GitHub 自己登入到自己的 GHCR 儲存庫
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_CR_TOKEN }}

      # 2. 自動打包你的 Node.js App Image，推上 ghcr.io
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile # 這裡指定了你放在 docker/底下的 Dockerfile，正確！
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/angular-blog-app:latest

  deploy-to-gcp:
    needs: build-and-push # 確保 Image 成功推上 GHCR 後，才執行 GCP 部署
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      # 3. 【修正版】單獨把檔案空投過去，並「拔除」原本的 docker/ 前綴資料夾結構
      - name: Copy docker-compose.prod.yml to GCP VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          source: "docker/docker-compose.prod.yml"
          target: "~/"
          strip_components: 1 # 💡 這行是魔法！它會把 "docker/" 這個外殼剝掉，只傳送檔案本身

      # 4. 【遠端下令】現在檔案直接躺在 ~/ 目录下了，指令變得極度簡單精確
      - name: Executing remote SSH commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            # 遠端叫 GCP 登入 ghcr.io
            echo "${{ secrets.GH_CR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 💡 直接讀取家目錄下的檔案（拿掉了中間的 /docker/ 路徑）
            # 根據 docker-compose.prod.yml 抓取最新 Image
            docker compose -f ~/docker-compose.prod.yml pull

            # 重新啟動容器
            docker compose -f ~/docker-compose.prod.yml up -d

            # 清理舊 Image
            docker image prune -f