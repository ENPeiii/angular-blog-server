name: Deploy Blog to GCP

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed
    branches:
      - issue/CICD-test

jobs:
  deploy-to-gcp:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      # 3. 【修正版】單獨把檔案空投過去，並「拔除」原本的 docker/ 前綴資料夾結構
      - name: Copy docker-compose.prod.yml to GCP VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          source: "docker/docker-compose.prod.yml"
          target: "~/"
          strip_components: 1 # 💡 這行是魔法！它會把 "docker/" 這個外殼剝掉，只傳送檔案本身

      # 4. 【遠端下令】現在檔案直接躺在 ~/ 目录下了，指令變得極度簡單精確
      - name: Executing remote SSH commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            # 遠端叫 GCP 登入 ghcr.io
            echo "${{ secrets.GH_CR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 💡 直接讀取家目錄下的檔案（拿掉了中間的 /docker/ 路徑）
            # 根據 docker-compose.prod.yml 抓取最新 Image
            docker compose -f ~/docker-compose.prod.yml pull

            # 重新啟動容器
            docker compose -f ~/docker-compose.prod.yml up -d

            # 清理舊 Image
            docker image prune -f
